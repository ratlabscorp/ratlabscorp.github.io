baseURL = "https://ratlabscorp.github.io/"
languageCode = "en-us"
title = "Rat Labs"
theme = "ratlabs"

# Enable features
enableRobotsTXT = true
enableGitInfo = true

# Pagination
[pagination]
  pagerSize = 10
  path = "page"

# Syntax highlighting via Chroma (no external JS)
[markup]
  [markup.highlight]
    style = "monokailight"
    lineNos = false
    noClasses = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"
  project_tag = "project_tags"

# Output formats — RSS + HTML for all sections
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

# Main navigation menu
[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Work"
    url = "/projects/"
    weight = 2
  [[menu.main]]
    name = "Notes"
    url = "/blog/"
    weight = 3
  [[menu.main]]
    name = "Manifesto"
    url = "/manifesto/"
    weight = 4
  [[menu.main]]
    name = "Members"
    url = "/members/"
    weight = 5

# Site parameters
[params]
  description = "Independent research in software, computing systems, and artificial intelligence."
  tagline = "Don't be a rat."
  author = "Rat Labs"
  github = "https://github.com/ratlabscorp"
  email = "rat.labs.m@gmail.com"
  # OpenGraph image
  ogImage = "/images/og-default.png"
  # Enable dark mode toggle
  darkMode = true
  # Reading list categories (order matters for display)
  readingCategories = [
    "Systems",
    "Programming Languages",
    "Operating Systems",
    "AI",
    "Machine Learning",
    "Distributed Systems",
    "Security",
    "Mathematics"
  ]
