<div id="custom-cursor" class="custom-cursor">
  <!-- Open Paw SVG -->
  <svg class="paw-open" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <!-- Toes -->
    <circle cx="7" cy="14" r="2.2" />
    <circle cx="12.5" cy="9.5" r="2.8" />
    <circle cx="19.5" cy="9.5" r="2.8" />
    <circle cx="25" cy="14" r="2.2" />
    <!-- Main pad -->
    <path d="M16 14.5c-4.5 0-7 3.5-7 7s3 5.5 7 5.5 7-2 7-5.5-2.5-7-7-7z" />
  </svg>
  
  <!-- Closed Paw SVG -->
  <svg class="paw-closed" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <!-- Toes clenched -->
    <circle cx="9.5" cy="15.5" r="1.8" />
    <circle cx="13.5" cy="12.5" r="2.2" />
    <circle cx="18.5" cy="12.5" r="2.2" />
    <circle cx="22.5" cy="15.5" r="1.8" />
    <!-- Main pad tighter -->
    <path d="M16 16c-4 0-6 3-6 6s2.5 4.5 6 4.5 6-1.5 6-4.5-2-6-6-6z" />
  </svg>
</div>

<style>
  #custom-cursor {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 32px;
    height: 32px;
    pointer-events: none;
    z-index: 999999;
    will-change: transform;
  }

  #custom-cursor svg {
    width: 100%;
    height: 100%;
    fill: var(--ac);
  }

  #custom-cursor .paw-closed {
    display: none;
  }

  #custom-cursor.grabbing .paw-open {
    display: none;
  }

  #custom-cursor.grabbing .paw-closed {
    display: block;
  }

  /* Force hide system cursor on all elements when custom cursor is active */
  @media (pointer: fine) {
    body.has-custom-cursor,
    body.has-custom-cursor * {
      cursor: none !important;
    }
    #custom-cursor {
      display: block;
    }
  }
</style>

<script>
  (function() {
    // Only initialize custom cursor if user is on a device with a pointing system (mouse/trackpad)
    const hasMouse = window.matchMedia('(pointer: fine)').matches;
    if (!hasMouse) return;

    // Add CSS trigger class to body to hide browser cursor globally
    document.body.classList.add('has-custom-cursor');

    const cursor = document.getElementById('custom-cursor');
    if (!cursor) return;

    let mouseX = -100;
    let mouseY = -100;

    window.addEventListener('mousemove', function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      // Safety: make sure cursor is shown when moving
      if (cursor.style.display === 'none') {
        cursor.style.display = 'block';
      }
    });

    window.addEventListener('mousedown', function() {
      cursor.classList.add('grabbing');
    });

    window.addEventListener('mouseup', function() {
      cursor.classList.remove('grabbing');
    });

    // Hide custom cursor when mouse leaves window bounds
    document.addEventListener('mouseleave', function() {
      cursor.style.display = 'none';
    });

    document.addEventListener('mouseenter', function() {
      cursor.style.display = 'block';
    });

    // Animate loop with requestAnimationFrame for frame-synchronized motion
    function updatePosition() {
      // Direct instant positioning for a raw, lag-free minimal feel
      cursor.style.transform = 'translate3d(' + (mouseX - 12.5) + 'px, ' + (mouseY - 9.5) + 'px, 0)';

      requestAnimationFrame(updatePosition);
    }
    requestAnimationFrame(updatePosition);
  })();
</script>
