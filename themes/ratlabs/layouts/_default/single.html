{{ define "main" }}
<div class="container">
  <article aria-labelledby="page-title">
    <header class="page-header">
      <h1 class="page-header__title" id="page-title">{{ .Title }}</h1>
      {{ with .Params.subtitle }}
      <p class="page-header__subtitle">{{ . }}</p>
      {{ end }}
    </header>
    <div class="prose">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
