{{ define "main" }}
<div class="container">

  <header class="page-header">
    <p class="page-header__label">{{ .Data.Plural }}</p>
    <h1 class="page-header__title">{{ .Title | title }}</h1>
  </header>

  <ul class="topic-filter__list" role="list" style="margin-top: var(--space-8);">
    {{ range .Data.Terms.Alphabetical }}
    <li>
      <a href="{{ .Page.Permalink }}" class="topic-filter__tag">
        {{ .Page.Title }}
        <span class="topic-filter__count">{{ .Count }}</span>
      </a>
    </li>
    {{ end }}
  </ul>

</div>
{{ end }}
